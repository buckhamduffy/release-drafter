ignore_merge_commits = true
branch_whitelist = ["master", "main"]
pre_bump_hooks = []
post_bump_hooks = [
	"npm run prepare",
	"git add dist/"
]
tag_prefix = "v"

[commit_types]
chore = { changelog_title = "Chore" }
ci = { changelog_title = "CI" }

[changelog]
path = "CHANGELOG.md"
authors = []

[bump_profiles]
